<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BotMaster — Звезда желаний</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #020308; 
            color: #fff; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            overflow: hidden; 
            height: 100vh; 
            width: 100vw; 
        }
        canvas { 
            position: fixed; 
            top: 0; left: 0; 
            z-index: 0; 
        }
        /* Эффект земли снизу */
        .ground-gradient {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 25vh;
            background: linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0));
            z-index: 1;
            pointer-events: none;
        }
        .overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            pointer-events: none;
            user-select: none;
            width: 90%;
        }
        h1 { 
            font-size: clamp(3rem, 9vw, 5.5rem); 
            font-weight: 600; 
            margin-bottom: 1.5rem; 
            letter-spacing: -0.02em;
            text-shadow: 0 0 80px rgba(0,0,0,0.9), 0 0 30px rgba(180, 200, 255, 0.2);
            opacity: 0;
            animation: fadeIn 1.5s 0.5s forwards;
        }
        p { 
            font-size: clamp(1rem, 3vw, 1.5rem); 
            color: #a0a8c0;
            text-shadow: 0 0 40px rgba(0,0,0,0.9);
            opacity: 0;
            animation: fadeIn 1.5s 1.2s forwards;
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        /* Анимированная подсказка внизу */
        .scroll-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #606880;
            font-size: 0.9rem;
            z-index: 10;
            pointer-events: none;
            user-select: none;
            opacity: 0;
            animation: fadeIn 1.5s 2.5s forwards, float 2.5s ease-in-out infinite;
            letter-spacing: 0.05em;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        @keyframes float {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-8px); }
        }
    </style>
</head>
<body>
    <canvas id="skyCanvas"></canvas>
    <div class="ground-gradient"></div>
    
    <div class="overlay">
        <!-- ВОТ ЗДЕСЬ БЫЛ УТЕРЯН id="main-title", ИЗ-ЗА КОТОРОГО ПРОПАЛА ЗВЕЗДА -->
        <h1 id="main-title">Твой магазин<br>в Telegram</h1>
        <p>Готовое решение для тех, кто создаёт руками.</p>
    </div>
    <!-- Подсказка изменена на твою -->
    <div class="scroll-hint">Спуститься на землю ↓</div>

    <script>
        (function() {
            const canvas = document.getElementById('skyCanvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            
            let stars = [];
            const STAR_COUNT = 350;
            let shootingStar = null;
            const SHOOTING_STAR_DELAY = 5000;
            let lastShootingStarTime = 0;
            let targetZone = null;

            function updateTargetZone() {
                // Теперь эта функция снова находит заголовок по id="main-title"
                const title = document.getElementById('main-title');
                if (!title) return;
                const rect = title.getBoundingClientRect();
                const lineHeight = rect.height / 2;
                const firstLineY = rect.top + lineHeight * 0.4;
                const firstLineLeft = rect.left;
                const targetX = firstLineLeft + rect.width * 0.12;
                const targetY = firstLineY;
                targetZone = { x: targetX, y: targetY, width: rect.width * 0.2, height: lineHeight * 0.8 };
            }
            window.addEventListener('resize', updateTargetZone);
            setTimeout(updateTargetZone, 1000);

            function initStars() {
                stars = [];
                for (let i = 0; i < STAR_COUNT; i++) {
                    stars.push({
                        x: Math.random() * width,
                        y: Math.random() * height * 0.85,
                        baseSize: Math.random() * 2.5 + 0.5,
                        brightness: Math.random(),
                        speed: Math.random() * 0.02 + 0.005,
                        direction: Math.random() < 0.5 ? 1 : -1,
                        hue: Math.random() < 0.1 ? 220 : 0,
                    });
                }
            }

            function drawStarShape(ctx, x, y, size, alpha) {
                const innerRadius = size * 0.2;
                const outerRadius = size;
                
                ctx.save();
                ctx.translate(x, y);
                ctx.globalAlpha = alpha;
                
                for (let i = 0; i < 4; i++) {
                    const angle = (i * Math.PI) / 2;
                    const dx = Math.cos(angle);
                    const dy = Math.sin(angle);
                    ctx.beginPath();
                    ctx.moveTo(dx * innerRadius, dy * innerRadius);
                    ctx.lineTo(dx * outerRadius, dy * outerRadius);
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = size * 0.3;
                    ctx.lineCap = 'round';
                    ctx.stroke();
                }
                
                for (let i = 0; i < 4; i++) {
                    const angle = (i * Math.PI) / 2 + Math.PI / 4;
                    const dx = Math.cos(angle);
                    const dy = Math.sin(angle);
                    ctx.beginPath();
                    ctx.moveTo(dx * innerRadius * 0.6, dy * innerRadius * 0.6);
                    ctx.lineTo(dx * outerRadius * 0.5, dy * outerRadius * 0.5);
                    ctx.lineWidth = size * 0.15;
                    ctx.stroke();
                }
                
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 0.8);
                gradient.addColorStop(0, `rgba(255, 255, 255, 1)`);
                gradient.addColorStop(1, `rgba(255, 255, 255, 0)`);
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(0, 0, size * 0.8, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }

            function resize() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                initStars();
                updateTargetZone();
            }
            window.addEventListener('resize', resize);
            resize();

            function animate(timestamp) {
                ctx.clearRect(0, 0, width, height);
                ctx.fillStyle = '#020308';
                ctx.fillRect(0, 0, width, height);
                
                const nebulaGrad = ctx.createLinearGradient(0, 0, width * 0.7, height);
                nebulaGrad.addColorStop(0, 'rgba(20, 25, 45, 0.5)');
                nebulaGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
                ctx.fillStyle = nebulaGrad;
                ctx.fillRect(0, 0, width, height);

                stars.forEach(star => {
                    star.brightness += star.speed * star.direction;
                    if (star.brightness >= 1.0) {
                        star.brightness = 1.0;
                        star.direction = -1;
                    } else if (star.brightness <= 0.15) {
                        star.brightness = 0.15;
                        star.direction = 1;
                    }
                    
                    const alpha = star.brightness * 0.9;
                    const size = star.baseSize;
                    
                    if (star.hue === 220) {
                        ctx.fillStyle = `rgba(170, 200, 255, ${alpha})`;
                        ctx.beginPath();
                        ctx.arc(star.x, star.y, size * 0.8, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        drawStarShape(ctx, star.x, star.y, size, alpha);
                    }
                });

                const currentTime = timestamp || 0;
                if (!shootingStar && currentTime - lastShootingStarTime > SHOOTING_STAR_DELAY) {
                    if (!targetZone) updateTargetZone();
                    if (targetZone) {
                        const startX = width * 0.9;
                        const startY = targetZone.y - height * 0.15;
                        const dx = targetZone.x - startX;
                        const dy = targetZone.y - startY;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const speed = 150;
                        const vx = (dx / dist) * speed;
                        const vy = (dy / dist) * speed;
                        
                        shootingStar = {
                            x: startX,
                            y: startY,
                            vx: vx,
                            vy: vy,
                            life: 1.0,
                            decay: 0.4 / (dist / speed),
                            length: 80,
                            targetX: targetZone.x,
                            targetY: targetZone.y
                        };
                    } else {
                        shootingStar = {
                            x: width * 0.9, y: height * 0.25,
                            vx: -1.8, vy: 2.8, life: 1.0, decay: 0.01, length: 80
                        };
                    }
                    lastShootingStarTime = currentTime;
                }

                if (shootingStar) {
                    const { x, y, vx, vy, life, decay, length } = shootingStar;
                    
                    const tailX = x - vx * length * life * 0.02;
                    const tailY = y - vy * length * life * 0.02;
                    
                    const gradient = ctx.createLinearGradient(x, y, tailX, tailY);
                    gradient.addColorStop(0, `rgba(255, 255, 255, ${life})`);
                    gradient.addColorStop(0.5, `rgba(255, 230, 150, ${life * 0.7})`);
                    gradient.addColorStop(1, `rgba(255, 200, 50, 0)`);
                    
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(tailX, tailY);
                    ctx.strokeStyle = gradient;
                    ctx.lineWidth = 2.5;
                    ctx.lineCap = 'round';
                    ctx.stroke();
                    
                    ctx.shadowColor = 'rgba(255, 255, 255, 0.9)';
                    ctx.shadowBlur = 16;
                    ctx.fillStyle = `rgba(255, 255, 255, ${life})`;
                    ctx.beginPath();
                    ctx.arc(x, y, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    
                    drawStarShape(ctx, x, y, 5, life * 0.9);
                    
                    const distToTarget = Math.sqrt((x - shootingStar.targetX) ** 2 + (y - shootingStar.targetY) ** 2);
                    if (distToTarget < 15 || shootingStar.life <= 0.01) {
                        shootingStar = null;
                    } else {
                        shootingStar.x += vx * 0.016;
                        shootingStar.y += vy * 0.016;
                        shootingStar.life -= decay * 0.016;
                    }
                }

                requestAnimationFrame(animate);
            }

            animate(performance.now());
        })();
    </script>
</body>
</html>
